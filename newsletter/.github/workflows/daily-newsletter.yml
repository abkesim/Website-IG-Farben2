name: Daily AI Newsletter

on:
  schedule:
    - cron: '0 7 * * *'   # every day at 7:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_newsletter.py

      - name: Commit and push
        run: |
          git config user.name "newsletter-bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          git add newsletters/
          git diff --staged --quiet || git commit -m "Newsletter $(date +%Y-%m-%d)"
          git push
